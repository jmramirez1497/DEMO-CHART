<div class="flex min-w-0 flex-auto flex-col">
    <!-- Main -->
    <div class="flex-auto p-6 sm:p-10">
        <!-- Botón exportar -->
        <div class="flex justify-end px-4 pt-4">
            <button
                type="button"
                (click)="exportarPDF()"
                class="flex items-center gap-2 px-4 py-2 text-sm bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors"
            >
                Exportar PDF
            </button>
        </div>
        <!-- CONTENT GOES HERE -->
        <div id="dashboard-content"  class="w-full flex flex-col gap-8 p-4">
            <!-- Título principal -->
            <h1 class="text-center text-2xl font-semibold tracking-wide text-gray-800"
                style="font-family: 'Titillium Web', sans-serif;">
                Consumo de Energía
            </h1>
            <!-- ── FILA 1: Tabla resumen anual (ancho completo) ────────────────────── -->
            <section class="flex flex-col sm:flex-row gap-4 items-center align-top">
                <div class="flex-1 w-1/2 h-full">
                    <h2 class="text-lg font-semibold text-gray-700 mb-3">Resumen anual de energía</h2>
                    <table mat-table [dataSource]="filasTabla()" class="w-full mat-elevation-z1">

                    <ng-container matColumnDef="anio">
                        <th mat-header-cell *matHeaderCellDef class="font-semibold">Año</th>
                        <td mat-cell *matCellDef="let row"
                            [class.font-bold]="!row.esFila"
                            [class.text-primary-700]="!row.esFila">
                        {{ row.anio }}
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="energia_kwh">
                        <th mat-header-cell *matHeaderCellDef class="font-semibold text-right">Energía (KWH)</th>
                        <td mat-cell *matCellDef="let row" class="text-right" [class.font-bold]="!row.esFila">
                        {{ fmtKwh(row.energia_kwh) }}
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="energia_kwh_ton">
                        <th mat-header-cell *matHeaderCellDef class="font-semibold text-right">Energía / Prod (KWH/TON)</th>
                        <td mat-cell *matCellDef="let row" class="text-right" [class.font-bold]="!row.esFila">
                        {{ fmtKwhTon(row.energia_kwh_ton) }}
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="columnasTabla"></tr>
                    <tr mat-row *matRowDef="let row; columns: columnasTabla;"
                        [class.bg-gray-50]="!row.esFila"></tr>
                    </table>
                </div>
                <div class="w-1/2 h-full">
                    <h2 class="text-lg font-semibold text-gray-700 mb-2">Días de mayor consumo energético [KWH]</h2>
                    <apx-chart class="w-full h-full"
                        [series]="seriesMayorConsumo"
                        [chart]="chartMayorConsumo"
                        [xaxis]="xAxisMayorConsumo"
                        [yaxis]="yAxisMayorConsumo"
                        [plotOptions]="plotOptionsMayorConsumo"
                        [tooltip]="tooltipMayorConsumo",
                        [dataLabels]="dataLabelsMayorConsumo"
                        [grid]="grid"
                    />
                </div>
            </section>

            <!-- ── FILA 2: Filtros compartidos año + mes ───────────────────────────── -->
            <div class="flex gap-4 items-end">
                <div class="flex flex-col gap-1">
                <label class="text-xs font-medium text-gray-600">Año</label>
                    <select
                        class="border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400"
                        [ngModel]="selectedAnio()"
                        (ngModelChange)="selectedAnio.set($event)"
                    >
                        @for (anio of anios; track anio) {
                        <option [value]="anio">{{ anio }}</option>
                        }
                    </select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-gray-600">Mes</label>
                    <select
                        class="border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400"
                        [ngModel]="selectedMes()"
                        (ngModelChange)="selectedMes.set($event)"
                    >
                        @for (mes of mesesOpts; track mes.key) {
                        <option [value]="mes.key">{{ mes.label }}</option>
                        }
                    </select>
                </div>
            </div>

            <!-- ── FILA 3: Consumo diario + Donut % mensual ────────────────────────── -->
            <div class="flex flex-col lg:flex-row gap-6">
                <div class="flex-1 min-w-0 w-1/2">
                <apx-chart
                    [series]="seriesConsumoDiario()"
                    [chart]="chartConsumoDiario"
                    [xaxis]="xAxisConsumoDiario()"
                    [yaxis]="yAxisConsumoDiario"
                    [stroke]="stroke"
                    [markers]="markersDiario"
                    [tooltip]="tooltipConsumoDiario"
                    [title]="titleConsumoDiario()"
                    [grid]="grid"
                />
                </div>
                <div class="w-1/2">
                    <apx-chart
                        [series]="seriesPctMensual()"
                        [chart]="chartPctMensual"
                        [labels]="labelsPctMensual()"
                        [colors]="colorsPctMensual()"
                        [dataLabels]="dataLabelsPct"
                        [plotOptions]="plotOptionsPct"
                        [legend]="legendPct"
                        [tooltip]="tooltipPct"
                        [title]="titlePctMensual()"
                    />
                </div>
            </div>

            <!-- ── FILA 4: Consumo mensual KWH + Relación mensual KWH/TON ──────────── -->
            <div class="flex flex-col lg:flex-row gap-6">
                <div class="flex-1 min-w-0">
                <apx-chart
                    [series]="seriesConsumoMensual()"
                    [chart]="chartConsumoMensual"
                    [xaxis]="xAxisMeses"
                    [yaxis]="yAxisKwh"
                    [stroke]="stroke"
                    [legend]="legend"
                    [grid]="grid"
                    [tooltip]="tooltipKwh"
                    [title]="titleConsumoMensual"
                />
                </div>
                <div class="flex-1 min-w-0">
                <apx-chart
                    [series]="seriesRelacionMensual()"
                    [chart]="chartRelacionMensual"
                    [xaxis]="xAxisMeses"
                    [yaxis]="yAxisRelacion"
                    [stroke]="stroke"
                    [legend]="legend"
                    [grid]="grid"
                    [tooltip]="tooltipRelacion"
                    [title]="titleRelacionMensual"
                />
                </div>
            </div>
        </div>
    </div>
</div>
